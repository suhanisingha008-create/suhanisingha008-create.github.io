<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>click click</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  overflow: hidden;
  background: #111;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.screen {
  position: absolute;
  text-align: center;
  display: none;
  width: 100%;
  height: 100%;
}

.active {
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

.moving {
  font-size: 50px;
  position: fixed;
  cursor: pointer;
  transition: all 0.3s ease-out;
  user-select: none;
}

.vibrate {
  animation: vibrate 0.3s;
}

@keyframes vibrate {
  0% {transform: translateX(0);}
  25% {transform: translateX(-8px);}
  50% {transform: translateX(8px);}
  75% {transform: translateX(-8px);}
  100% {transform: translateX(0);}
}

.floating {
  animation: float 3s ease-in-out infinite;
}

@keyframes float {
  0%, 100% {transform: translateY(0px);}
  50% {transform: translateY(-20px);}
}

.box {
  font-size: 60px;
  cursor: pointer;
  transition: all 0.3s ease-out;
}

.shake {
  animation: shake 0.4s;
}

@keyframes shake {
  0% {transform: translateX(0);}
  25% {transform: translateX(-5px);}
  50% {transform: translateX(5px);}
  75% {transform: translateX(-5px);}
  100% {transform: translateX(0);}
}

.falling-box {
  position: fixed;
  font-size: 40px;
  pointer-events: none;
  animation: fall 3s ease-in forwards;
  z-index: 10;
}

@keyframes fall {
  0% {
    top: -50px;
    opacity: 1;
    transform: rotateZ(0deg);
  }
  100% {
    top: 100vh;
    opacity: 0;
    transform: rotateZ(360deg);
  }
}

.final-content {
  opacity: 0;
  transition: opacity 1s ease-in;
  text-align: center;
}

.final-content.show {
  opacity: 1;
}

.final-content h2 {
  font-size: 32px;
  margin-bottom: 20px;
  color: #ffd700;
  text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
}

.final-content .quote {
  font-size: 20px;
  font-style: italic;
  margin-bottom: 30px;
  color: #ccc;
}

img {
  width: 250px;
  border-radius: 10px;
  box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
  animation: scaleIn 0.6s ease-out;
}

@keyframes scaleIn {
  from {
    transform: scale(0.5);
    opacity: 0;
  }
  to {
    transform: scale(1);
    opacity: 1;
  }
}

p {
  font-size: 24px;
  margin-bottom: 50px;
}
</style>
</head>

<body>

<!-- SCREEN 1 -->
<div class="screen active" id="s1">
  <p>Can you use your finger and click?</p>
  <div class="moving" id="emoji1" onclick="emojiClick(this, 2)">🦐</div>
</div>

<!-- SCREEN 2 -->
<div class="screen" id="s2">
  <p>oh can you click this now?</p>
  <div class="moving" id="emoji2" onclick="emojiClick(this, 3)">🌸</div>
</div>

<!-- SCREEN 3 -->
<div class="screen" id="s3">
  <p>see a star around?</p>
  <div class="moving" id="emoji3" onclick="emojiClick(this, 4)">⭐</div>
</div>

<!-- SCREEN 4 -->
<div class="screen" id="s4">
  <p>there you go</p>
  <div class="box" onclick="openbox(this)">📦</div>
</div>

<!-- FINAL -->
<div class="screen" id="s5">
  <div class="final-content">
    <h2>Suhani sent you a box</h2>
    <p class="quote">Have a nice day, thank you</p>
    <img src="11e267f0c9ffc9aac2cdc321b9ada3cf.jpg">
  </div>
</div>

<script>
let isMoving = false;

function next(n) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('s' + n).classList.add('active');
  isMoving = false;
}

function getRandomPosition() {
  const x = Math.random() * (window.innerWidth - 100);
  const y = Math.random() * (window.innerHeight - 100);
  return { x, y };
}

function emojiClick(el, nextScreen) {
  if (isMoving) return;
  
  isMoving = true;
  
  // Vibrate effect
  el.classList.add('vibrate');
  
  // After vibration, move around randomly
  setTimeout(() => {
    el.classList.remove('vibrate');
    el.classList.add('floating');
    
    // Move to random position
    const pos = getRandomPosition();
    el.style.left = pos.x + 'px';
    el.style.top = pos.y + 'px';
    
    // Make it clickable again after movement settles
    setTimeout(() => {
      el.classList.remove('floating');
      el.onclick = function() { goToNext(nextScreen); };
    }, 3000);
  }, 300);
}

function goToNext(screenNum) {
  next(screenNum);
}

function openbox(el) {
  el.classList.add("shake");
  el.style.cursor = "not-allowed";
  el.onclick = null;

  // Create many falling boxes
  const boxCount = 50;
  for (let i = 0; i < boxCount; i++) {
    setTimeout(() => {
      let fallingBox = document.createElement("div");
      fallingBox.className = "falling-box";
      fallingBox.innerHTML = "📦";
      fallingBox.style.left = Math.random() * window.innerWidth + "px";
      fallingBox.style.animationDuration = (2 + Math.random() * 2) + "s";
      fallingBox.style.animationDelay = (Math.random() * 0.5) + "s";
      document.body.appendChild(fallingBox);

      // Remove element after animation
      setTimeout(() => {
        fallingBox.remove();
      }, (2 + Math.random() * 2) * 1000 + 500);
    }, i * 40);
  }

  // Show final content after boxes finish falling
  setTimeout(() => {
    next(5);
    // Show final content with fade-in
    setTimeout(() => {
      const finalContent = document.querySelector('.final-content');
      finalContent.classList.add('show');
    }, 100);
  }, 4000);
}

// Center emojis on screen load
window.addEventListener('load', () => {
  const emojis = document.querySelectorAll('.moving');
  emojis.forEach(emoji => {
    emoji.style.left = (window.innerWidth / 2 - 25) + 'px';
    emoji.style.top = (window.innerHeight / 2) + 'px';
  });
});
</script>

</body>
</html>
